name: "Release"
run-name: Release new ${{ inputs.version-type }} from ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      version-type:
        description: "Version type"
        required: true
        type: choice
        default: "alpha"
        options:
          - "alpha"
          - "beta"
          - "GA"
      version-scope:
        description: "Version scope"
        required: true
        type: choice
        default: "patch"
        options:
          - "patch"
          - "minor"
          - "major"

# The GITHUB_TOKEN only needs to read the repository; the tag is pushed by the
# reusable workflow with the GitHub App token.
permissions:
  contents: read

jobs:
  release:
    uses: scality/workflows/.github/workflows/release.yaml@7d91dc4ebbe136b54518aa42a1ad6014f8f91526 # v2.9.1
    with:
      version-type: ${{ inputs.version-type }}
      version-scope: ${{ inputs.version-scope }}
      actions-app-id: ${{ vars.ACTIONS_APP_ID }}
    secrets: inherit
